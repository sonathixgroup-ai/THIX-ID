name: thix_id
description: "THIX ID is a robust digital identity platform..."
publish_to: "none"
version: 1.0.0

environment:
  sdk: ">=3.6.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1

  provider: ^6.1.2
  go_router: ^16.3.0

  fl_chart: ^0.68.0

  # Firebase core stack (stable align)
  firebase_core: ^4.6.0
  firebase_auth: ^5.3.3
  cloud_firestore: ^5.5.0
  firebase_messaging: ^16.0.0
  firebase_storage: ^13.0.0

  # Backend / API
  http: ^1.2.2
  supabase_flutter: ^1.10.25

  shared_preferences: ^2.3.2
  path_provider: ^2.1.4

  # Media
  video_player: ^2.9.2

  # ⚠️ Choix sécurisé : garder Agora OU WebRTC (Agora recommandé ici)
  agora_rtc_engine: ^6.0.0

  # Audio / recording
  record: ^5.1.2

  # Location
  geolocator: ^13.0.4

  # NFC & scanning
  nfc_manager: ^4.0.0
  mobile_scanner: ^7.0.0
  qr_flutter: ^4.1.0
  barcode_widget: ^2.0.0

  # Notifications & permissions
  flutter_local_notifications: ^20.0.0
  permission_handler: ^12.0.0

  # Sharing & files
  share_plus: ^10.0.0
  file_picker: ^8.1.2

  # PDF / Print
  printing: ^5.13.0
  pdf: ^3.11.0

  # Utils
  crypto: ^3.0.0
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/dreamflow_icon.jpg"
  remove_alpha_ios: true
